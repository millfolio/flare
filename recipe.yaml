# rattler-build recipe for flare
# Distributes flare and its inlined json dependency as their *source* trees
# under $PREFIX/lib/mojo/ rather than as pre-compiled .mojopkg artifacts —
# same shape as ehsanmok/sqlite. Consumers' Mojo resolves
# ``from flare.http import ...`` and the transitive ``from json import ...``
# directly from these source files at their own compile time.
#
# Why source-level distribution rather than ``mojo package``:
#   1. A ``.mojopkg`` produced by ``mojo package`` embeds the compiler
#      version it was built with and refuses to load against any other
#      version (``Mojo package is incompatible: package version X is
#      newer/older than compiler version Y``). That tightly couples the
#      published .conda artifact to a specific Mojo nightly, so even a
#      benign Mojo bump on the consumer side invalidates flare overnight.
#   2. ``mojo package`` also adds an extra Mojo run during the recipe
#      build, which a stale build cache or a pre-release Mojo nightly
#      can break in ways unrelated to flare's own source.
# Source distribution sidesteps both: the .conda has zero ABI-locked
# binary content from Mojo, only the source files plus the C++ FFI .so's.
# The ``run: mojo == ...`` pin in the requirements still tells solvers
# which compiler to use — the difference is the lock now lives where
# it's easy to update (a one-line bump in this recipe), not embedded in
# a binary blob.
#
# json source is inlined at the v0.1.5 git tag (whose own recipe pins
# the same Mojo nightly) until json publishes to a public conda channel;
# at that point the inline ``json`` source step + the ``cp -r json-src/json``
# can be replaced with a ``host: [json]`` requirement.

context:
  name: flare
  version: "0.8.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  # flare source
  - path: .
  # json source (inlined; v0.1.5's recipe pins the same Mojo nightly we
  # ship against, see ``ehsanmok/json@v0.1.5/recipe.yaml``).
  - git: https://github.com/ehsanmok/json.git
    target_directory: json-src
    tag: v0.1.5

build:
  script:
    - mkdir -p $PREFIX/lib/mojo
    # ── Source trees (flare + json) staged under $PREFIX/lib/mojo/ ───────
    # Mojo discovers these the same way it discovers .mojopkg files in
    # that directory; no ``mojo package`` step required.
    - cp -r flare $PREFIX/lib/mojo/
    - cp -r json-src/json $PREFIX/lib/mojo/
    # ── flare: OpenSSL TLS FFI wrapper ───────────────────────────────────
    - $CXX -O2 -std=c++17 -fPIC -DNDEBUG -shared
        -o $PREFIX/lib/libflare_tls.so
        flare/tls/ffi/openssl_wrapper.cpp
        -I$PREFIX/include
        -L$PREFIX/lib
        -lssl -lcrypto
        -Wl,-rpath,$PREFIX/lib
    # ── json: simdjson FFI wrapper (loaded at runtime by json) ───────────
    - $CXX -O3 -std=c++17 -fPIC -DNDEBUG -shared
        -o $PREFIX/lib/libsimdjson_wrapper.so
        json-src/json/cpu/simdjson_ffi/simdjson_wrapper.cpp
        -I$PREFIX/include
        -L$PREFIX/lib
        -lsimdjson

requirements:
  build:
    - ${{ compiler('cxx') }}
    - git   # needed to clone json source
  host:
    - openssl >=3.0,<4
    - ca-certificates
    - simdjson >=4.2.4,<5    # json's simdjson FFI wrapper
  run:
    - mojo ==1.0.0b3.dev2026062706
    - openssl >=3.0,<4
    - ca-certificates
    - simdjson >=4.2.4,<5    # libsimdjson_wrapper.so is loaded at runtime

about:
  homepage: https://github.com/ehsanmok/flare
  license: MIT
  summary: Async-ready networking library for Mojo — TCP, UDP, TLS, HTTP and WebSocket
  description: |
    flare is a networking library for Mojo providing:
    - IP/socket address types (IPv4, IPv6, dual-stack)
    - DNS resolution (A/AAAA records via getaddrinfo)
    - TCP streams with connect-timeout support
    - UDP sockets (unicast and broadcast)
    - TLS 1.2+ streams via OpenSSL FFI (forward-secret AEAD ciphers only)
    - HTTP/1.1 client (GET, POST, PUT, DELETE) with gzip/deflate decompression
    - WebSocket client (RFC 6455) with TLS support
    - Ergonomic high-level API (http.get, http.post, http.ws_connect)
